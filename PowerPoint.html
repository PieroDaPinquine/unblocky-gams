<!DOCTYPE html>
<html lang="en-us">
<head>
    <base href="https://cdn.jsdelivr.net/gh/genizy/web-port@main/pizza-tower/">
    <meta charset="utf-8" />
    <meta name="viewport" content="viewport-fit=cover, width=device-width, initial-scale=1.0, minimum-scale=1.0, maximum-scale=1.0" />
    <link rel="icon" type="x-icon" href="favicon.png">
    <title>Create a new PowerPoint</title>
    <style>
        canvas {
            image-rendering: -webkit-optimize-contrast;
            image-rendering: pixelated;
            display: block;
            margin: 0 auto;
            background-color: black;
            width: 100vw;
            height: 100vh;
            object-fit: contain;
        }
        body { background-color: #000; margin: 0; overflow: hidden; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; }
        .loading { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); color: white; text-align: center; z-index: 10; }
        #status { margin-top: 10px; font-size: 14px; font-weight: bold; text-transform: uppercase; letter-spacing: 1px; }
        progress { width: 240px; height: 10px; accent-color: #ff0000; }
    </style>
</head>
<body>
    <canvas id="canvas" oncontextmenu="event.preventDefault()" tabindex="-1"></canvas>
    
    <div class="loading" id="loader">
        <div id="status">Loading Save Data...</div>
        <progress value="0" max="100" id="progress"></progress>
    </div>

    <script>
        const statusElement = document.getElementById('status');
        
        // --- Persistence Logic ---
        window.Module = {
            canvas: document.getElementById('canvas'),
            preRun: [function() {
                // Create the save directory and mount IDBFS (IndexedDB File System)
                try {
                    FS.mkdir('/saves');
                    FS.mount(IDBFS, {}, '/saves');
                    
                    // Sync from IndexedDB to the game's memory on startup
                    FS.syncfs(true, function (err) {
                        if (err) console.error("Save sync failed:", err);
                        console.log("Saves loaded from browser storage.");
                    });
                } catch(e) {
                    console.log("FS setup skipped or already exists.");
                }
            }],
            postRun: [function() {
                // Auto-save logic: Sync back to IndexedDB whenever the game writes
                setInterval(() => {
                    if (window.FS) {
                        FS.syncfs(false, (err) => {
                            if (err) console.error("Auto-sync error:", err);
                        });
                    }
                }, 5000); // Syncs every 5 seconds
            }]
        };

        // --- Optimized Asset Loader ---
        async function loadGame(fileParts) {
            try {
                const buffers = [];
                for (let i = 0; i < fileParts.length; i++) {
                    statusElement.innerText = `Downloading: ${Math.round((i / fileParts.length) * 100)}%`;
                    const res = await fetch(fileParts[i]);
                    buffers.push(await res.arrayBuffer());
                }

                statusElement.innerText = "Stitching Memory...";
                const total = buffers.reduce((a, b) => a + b.byteLength, 0);
                const merged = new Uint8Array(total);
                let offset = 0;
                for (const b of buffers) {
                    merged.set(new Uint8Array(b), offset);
                    offset += b.byteLength;
                }

                const url = URL.createObjectURL(new Blob([merged], { type: 'application/octet-stream' }));
                buffers.length = 0; // Clear memory
                return url;
            } catch (err) {
                statusElement.innerText = "Load Failed!";
                throw err;
            }
        }

        function getParts(f, s, e) {
            return Array.from({length: e - s + 1}, (_, i) => `${f}.part${i + s}`);
        }

        // --- Execution ---
        loadGame(getParts("game.unx", 1, 13)).then(url => {
            window.gameUnxUrl = url;

            // Patching for Safari
            const oldXHR = XMLHttpRequest.prototype.open;
            XMLHttpRequest.prototype.open = function(m, u) {
                if (u.includes("game.unx")) u = window.gameUnxUrl;
                return oldXHR.apply(this, arguments);
            };

            const scripts = ["index.js", "runner.js"];
            let idx = 0;
            function next() {
                if (idx >= scripts.length) {
                    document.getElementById('loader').style.display = 'none';
                    return;
                }
                const s = document.createElement("script");
                s.src = scripts[idx++];
                s.onload = next;
                document.body.appendChild(s);
            }
            statusElement.innerText = "Ready to Pizza...";
            next();
        });
    </script>
</body>
</html>
